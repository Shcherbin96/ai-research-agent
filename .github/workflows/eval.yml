name: eval

on:
  pull_request:
    paths:
      - 'src/**'
      - 'prompts/**'
      - 'eval/**'
      - 'pyproject.toml'
  workflow_dispatch:

# Eval costs real money (Anthropic API calls). Lock to one run at a time per PR
# and cancel older runs when new commits land.
concurrency:
  group: eval-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN || github.token }}
        run: uv run research-agent eval --output-dir eval/reports

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.event.pull_request.number || github.run_id }}
          path: eval/reports/
          retention-days: 30

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportsDir = 'eval/reports';
            const files = fs.readdirSync(reportsDir).filter(f => f.endsWith('.md')).sort();
            if (!files.length) {
              core.setFailed('No eval report markdown found.');
              return;
            }
            const latest = path.join(reportsDir, files[files.length - 1]);
            const body = '### Eval Results\n\n' + fs.readFileSync(latest, 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
